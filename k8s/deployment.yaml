apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devops-app
  labels:
    app: flask-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-devops
  template:
    metadata:
      labels:
        app: flask-devops
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: flask-app
        image: 500330120032.dkr.ecr.eu-north-1.amazonaws.com/devops-flask-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000